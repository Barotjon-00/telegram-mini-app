<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .balance-card {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .balance-label {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        
        .balance-amount {
            font-size: 36px;
            font-weight: bold;
            color: #00d084;
        }
        
        .topup-button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s;
        }
        
        .topup-button:active {
            transform: scale(0.98);
        }
        
        .games-section {
            margin-top: 30px;
        }
        
        .section-title {
            font-size: 20px;
            margin-bottom: 15px;
            padding-left: 5px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .game-card {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
        }
        
        .game-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        
        .game-name {
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎮 UZPIN</h1>
            <p>Игровая платформа</p>
        </div>

        <!-- Balance Card -->
        <div class="balance-card">
            <div class="balance-label">Ваш баланс</div>
            <div class="balance-amount">0 UZS</div>
            <button class="topup-button" onclick="topupBalance()">
                ↗ Пополнить
            </button>
        </div>

        <!-- Games Section -->
        <div class="games-section">
            <h2 class="section-title">🎯 Игры</h2>
            <div class="games-grid">
                <div class="game-card" onclick="selectGame('PUBG Mobile')">
                    <div class="game-icon">🎮</div>
                    <div class="game-name">PUBG Mobile</div>
                </div>
                <div class="game-card" onclick="selectGame('Mobile Legends')">
                    <div class="game-icon">⚔️</div>
                    <div class="game-name">Mobile Legends</div>
                </div>
                <div class="game-card" onclick="selectGame('Free Fire')">
                    <div class="game-icon">🔥</div>
                    <div class="game-name">Free Fire</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp
        let tg = window.Telegram.WebApp;
        
        tg.expand();
        tg.ready();

        // Set header color
        tg.setHeaderColor('#1a1a2e');
        tg.setBackgroundColor('#1a1a2e');

        function topupBalance() {
            tg.showPopup({
                title: 'Пополнение баланса',
                message: 'Выберите сумму пополнения:',
                buttons: [
                    {id: '10000', type: 'default', text: '10,000 UZS'},
                    {id: '50000', type: 'default', text: '50,000 UZS'},
                    {id: '100000', type: 'default', text: '100,000 UZS'}
                ]
            }, (buttonId) => {
                if (buttonId) {
                    tg.sendData(`Topup: ${buttonId} UZS`);
                }
            });
        }

        function selectGame(gameName) {
            tg.showPopup({
                title: gameName,
                message: `Вы выбрали ${gameName}. Что хотите сделать?`,
                buttons: [
                    {type: 'default', text: 'Пополнить аккаунт'},
                    {type: 'cancel', text: 'Отмена'}
                ]
            }, (buttonId) => {
                if (buttonId === 'default') {
                    tg.sendData(`Game: ${gameName}`);
                }
            });
        }
    </script>
</body>
</html>
